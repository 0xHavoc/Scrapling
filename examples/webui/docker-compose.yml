version: "3.9"

services:
  backend:
    image: pyd4vinci/scrapling:latest
    container_name: scrapling-webui-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Restrict this in production to your frontend domain(s)
      - ALLOWED_ORIGINS=http://localhost:5173
      # Add auth/rate limiting in your backend before exposing publicly
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    container_name: scrapling-webui-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
